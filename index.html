<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بـ❤️نوتـ❤️ي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #7928ca; 
            --secondary: #ff0080; 
            --gold: #ffd700;
            --neon-purple: #bc13fe;
            --deep-dark: #050010;
        }

        body {
            background: radial-gradient(circle at center, #1a0033 0%, #000000 100%);
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Cairo', sans-serif; overflow: hidden; perspective: 1500px;
            touch-action: manipulation;
        }

        #snow-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

        .lights { 
            position: absolute; top: 0; width: 100%; display: flex; 
            justify-content: space-around; z-index: 10; padding: 15px 0;
            filter: drop-shadow(0 0 10px white);
        }
        .light { 
            width: 14px; height: 14px; border-radius: 50%; 
            animation: blink 0.8s infinite alternate;
        }
        @keyframes blink { 
            0% { opacity: 0.3; transform: scale(0.8); box-shadow: 0 0 5px currentColor; } 
            100% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 25px currentColor; } 
        }

        .container { 
            position: relative; width: 92%; max-width: 400px; height: 600px;
            z-index: 5; transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .card {
            position: absolute; width: 100%; height: 100%; 
            background: rgba(15, 0, 30, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 45px; padding: 30px 20px; text-align: center;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4), inset 0 0 15px rgba(188, 19, 254, 0.2);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none;
            transform: translateZ(-500px) rotateY(90deg) scale(0.5);
            transition: all 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            border: 2px solid var(--neon-purple);
            transform-style: preserve-3d;
            visibility: hidden;
            color: white;
        }

        .active-card { 
            opacity: 1 !important; 
            pointer-events: auto !important; 
            transform: translateZ(0) rotateY(0deg) scale(1) !important; 
            z-index: 5; 
            visibility: visible;
        }

        .exit-card {
            opacity: 0 !important;
            transform: translateZ(500px) rotateY(-90deg) scale(1.2) !important;
        }

        .pro-emoji { 
            font-size: 5rem;
            filter: drop-shadow(0 0 20px var(--neon-purple)); 
            margin-bottom: 10px; 
            animation: live3DEmoji 3s infinite ease-in-out;
        }

        /* تنسيق الصورة الجديدة */
        .user-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            margin-bottom: 15px;
            animation: live3DEmoji 3s infinite ease-in-out;
        }

        @keyframes live3DEmoji {
            0%, 100% { transform: translateZ(60px) rotate(0deg) scale(1); }
            50% { transform: translateZ(100px) rotate(-10deg) translateY(-10px) scale(1.1); }
        }

        .main-brand { 
            font-family: 'Amiri', serif; font-size: 3rem; color: #fff; 
            margin: 0; text-shadow: 0 0 20px var(--neon-purple);
        }
        
        input {
            width: 100%; height: 55px; border-radius: 18px; border: 1px solid var(--neon-purple);
            margin: 10px 0; text-align: center; font-size: 1.1rem; transition: 0.3s;
            background: rgba(255,255,255,0.1); font-family: 'Cairo'; color: #fff;
        }
        input:focus { box-shadow: 0 0 20px var(--neon-purple); outline: none; background: rgba(255,255,255,0.2); }

        .unlock-btn { 
            width: 100%; min-height: 60px; border-radius: 20px; border: none; 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; 
            transition: 0.4s; box-shadow: 0 0 15px rgba(121, 40, 202, 0.5);
            margin-top: 10px;
        }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        .heart { position: absolute; bottom: -10%; z-index: 100; animation: flyUp 3s forwards linear; pointer-events: none; }
        @keyframes flyUp { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-1000px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>
    <div class="lights" id="top-lights"></div>

    <audio id="myAudio" loop>
        <source src="https://files.catbox.moe/vsab4f.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="cardContainer">
        <div id="step1" class="card active-card">
            <div style="margin-top: 20px;"></div>
            <span class="pro-emoji">🎁</span>
            <h1 class="main-brand">❤️ زهره ❤️</h1>
            <p style="color: rgba(255,255,255,0.8); font-size: 1.1rem; margin: 15px 0;">مستعدة يا زهراء ولا أجيبلك قهوة الأول؟ ☕</p>
            <input type="text" id="passCode" placeholder="قوليها عشان يفتح 😂✨" onkeypress="handleEnter(event)">
            <button class="unlock-btn" id="loginBtn" onclick="checkPassword()">افتحي بسرعة قبل ما النت يفصل 😭😂❤️</button>
        </div>

        <div id="step2" class="card">
            <img src="https://files.catbox.moe/nnoylj.jpg" alt="رسالة مخصوص لزهورتي ✨" class="user-img">
            <h3 style="color: var(--gold); font-size: 1.7rem; margin-bottom: 10px;">رسالة مخصوص لزهورتي ✨</h3>
            <div style="font-size: 1.1rem; color: #fff; line-height: 1.8; overflow-y: auto; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(188, 19, 254, 0.3);">
                <p>بصراحة كده يا زهراء..
أنا مبسوط إني اتعرفت عليكي 😌
دمك خفيف وكلامك حلو
ووجودك بيخلّي اليوم ألطف شوية 🌸
فقولت أعمل الحركة دي بدل الكلام التقليدي 😅

وقولي بقا بصراحة…
ضحكتي ولا شايفة إني روش زيادة؟ 😂
وقولي الكلمه بقا يبنتي</p>
            </div>
            <button class="unlock-btn"
onclick="window.open('https://wa.me/201094855679?text=بحبك%20يا%20حمدي%20😂❤️','_blank')"
style="margin-top:auto; background: rgba(255,255,255,0.1); border:1px solid var(--neon-purple);">

💬 اضغطي هنا 😂

</button>
        </div>
    </div>

    <script>
        // إعدادات الأضواء العلوية
        const lightsContainer = document.getElementById('top-lights');
        const colors = ['#bc13fe', '#7928ca', '#ff0080', '#ffd700'];
        for(let i=0; i<15; i++) {
            const light = document.createElement('div');
            light.className = 'light';
            light.style.color = colors[i % colors.length];
            light.style.backgroundColor = colors[i % colors.length];
            light.style.animationDelay = (i * 0.1) + 's';
            lightsContainer.appendChild(light);
        }

        function checkPassword() {
            const pass = document.getElementById('passCode').value;
            const correctPass = "بحبك";
            
            if(pass === correctPass) {
                // تشغيل الأغنية
                const audio = document.getElementById('myAudio');
                audio.play().catch(e => console.log("Audio play blocked, needs interaction"));
                
                nextStep(1, 2);
            } else {
                const btn = document.getElementById('loginBtn');
                btn.classList.add('shake');
                document.getElementById('passCode').style.borderColor = "red";
                setTimeout(() => {
                    btn.classList.remove('shake');
                    document.getElementById('passCode').style.borderColor = "#bc13fe";
                }, 500);
            }
        }

        function nextStep(current, next) {
            const currentCard = document.getElementById('step' + current);
            currentCard.classList.add('exit-card');
            setTimeout(() => {
                currentCard.classList.remove('active-card', 'exit-card');
                document.getElementById('step' + next).classList.add('active-card');
                startCelebration();
            }, 800);
        }

        function handleEnter(e) { if(e.key === "Enter") checkPassword(); }

        function startCelebration() {
            const emojis = ['❤️','💖','✨','💝','🥹','🏡'];
            for(let i=0; i<60; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
                    h.className = 'heart';
                    h.style.left = Math.random() * 100 + '%';
                    h.style.fontSize = (Math.random() * 30 + 20) + 'px';
                    h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 3000);
                }, i * 100);
            }
        }

        // محرك الثلج
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function initSnow() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            snowflakes = [];
            for(let i=0; i<80; i++) snowflakes.push({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 3 + 1, d: Math.random() * 1 });
        }
        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(188, 19, 254, 0.3)"; ctx.beginPath();
            for(let i=0; i<snowflakes.length; i++) {
                let p = snowflakes[i]; ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
            }
            ctx.fill(); moveSnow();
        }
        function moveSnow() {
            for(let i=0; i<snowflakes.length; i++) {
                let p = snowflakes[i]; p.y += Math.cos(p.d) + 1 + p.r/2; p.x += Math.sin(p.d) * 1;
                if(p.y > height) snowflakes[i] = {x: Math.random()*width, y: -10, r: p.r, d: p.d};
            }
        }
        window.addEventListener('resize', initSnow);
        initSnow(); setInterval(drawSnow, 30);
    </script>
</body>
</html>
